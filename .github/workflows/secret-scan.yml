name: Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets and PII
        run: |
          ERRORS=0

          # AWS keys
          if grep -rn 'AKIA[0-9A-Z]\{16\}' --include='*.js' --include='*.py' --include='*.sh' --include='*.md' --include='*.json' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::AWS access key found"
            ERRORS=$((ERRORS+1))
          fi

          # Azure subscription IDs (GUID pattern in context)
          if grep -rn 'subscription[_-]\?[Ii]d.*[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}' --include='*.js' --include='*.py' --include='*.sh' --include='*.json' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::Azure subscription ID found"
            ERRORS=$((ERRORS+1))
          fi

          # Private keys
          if grep -rn 'PRIVATE KEY' --include='*.js' --include='*.py' --include='*.sh' --include='*.pem' --include='*.key' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::Private key found"
            ERRORS=$((ERRORS+1))
          fi

          # Connection strings
          if grep -rn 'AccountKey=\|SharedAccessSignature=' --include='*.js' --include='*.py' --include='*.sh' --include='*.json' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::Connection string or SAS token found"
            ERRORS=$((ERRORS+1))
          fi

          # Hardcoded passwords
          if grep -rn 'password\s*=\s*["\x27][^"\x27]\{8,\}' --include='*.js' --include='*.py' --include='*.sh' . 2>/dev/null | grep -v node_modules | grep -v '.git/' | grep -v 'test' | grep -v '#'; then
            echo "::error::Hardcoded password found"
            ERRORS=$((ERRORS+1))
          fi

          # Personal paths (Windows user profiles)
          if grep -rn 'C:\\Users\\[A-Za-z]' --include='*.js' --include='*.py' --include='*.sh' --include='*.json' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::Personal Windows path found"
            ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "::error::${ERRORS} secret(s) found. Fix before merging."
            exit 1
          fi

          echo "No secrets found."
